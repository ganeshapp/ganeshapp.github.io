site_name: GAPP
site_url: https://www.gapp.in
site_author: Gapp
site_description: My personal digital garden

theme:
    name: 'material'
    icon:
      logo: fontawesome/solid/g
    favicon: images/favicon.ico
    
    features:
        - navigation.instant
        - navigation.instant.prefetch
        - navigation.instant.preview
        - navigation.path
        - navigation.footer
        - navigation.tracking
        - navigation.tabs
    palette:

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

# Extensions
markdown_extensions:
  - footnotes
  # - attr_list
  - pymdownx.arithmatex:
      generic: true
  # - pymdownx.superfences
  # - pymdownx.details
  # - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

  - toc:
      permalink: true
      baselevel: 2

plugins:
  - search
  - roamlinks 
  - blog:
      post_url_format: "{slug}"
  #- rss:
  #    match_path: blog/posts/.* 
  #    date_from_meta:
  #      as_creation: date
  #    categories:
  #      - categories
  #      - tags
      
extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/ganeshapp
    - icon: fontawesome/brands/square-twitter
      link: https://twitter.com/sagaro
    - icon: fontawesome/brands/hacker-news
      link: https://news.ycombinator.com/user?id=sagaro
    - icon: fontawesome/brands/strava
      link: https://www.strava.com/athletes/35037865

